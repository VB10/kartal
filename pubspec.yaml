name: kartal
description: Kartal is an extension package for easy to use at app development
  time. You can access more features with primitive variables(context, string
  etc.).
version: 4.1.1
issue_tracker: https://github.com/vb10/kartal/issues
repository: https://github.com/VB10/kartal
screenshots:
  - description: 'City of Kartal, Istanbul'
    path: github/screen/kartal.jpeg

environment:
  sdk: ">=3.3.1 <4.0.0"
  flutter: ">=1.17.0"

dependencies:
  collection: ">=1.16.0 <2.0.0"
  device_info_plus: ">=10.0.0 <13.0.0"
  diacritic: ^0.1.3
  dio: ">=5.0.0 <6.0.0"
  flutter:
    sdk: flutter
  html: ^0.15.4
  logger: ">=2.0.0 <3.0.0"
  mask_text_input_formatter: ^2.0.0
  mime: ">=1.0.0 <3.0.0"
  package_info_plus: ">=8.0.0 <10.0.0"
  share_plus: ">=10.0.0 <13.0.0"
  url_launcher: ">=6.1.5 <7.0.0"
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.2
  very_good_analysis: ^10.0.0

flutter:
  uses-material-design: true
